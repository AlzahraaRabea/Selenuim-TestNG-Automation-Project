# =============================================================
#  AutomationExercise — Environment Configuration
#  Bonus Requirement: configure browser, base URL, timeouts, etc.
# =============================================================

# Browser: chrome | edge | firefox
browser=chrome

# Headless mode: true | false
headless=false

# Base URL
base.url=https://www.automationexercise.com

# Implicit / Explicit wait (seconds)
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# Screenshots on failure: true | false
screenshot.on.failure=true

# Allure results directory
allure.results.dir=target/allure-results

# Test data file paths
testdata.users=src/test/resources/testdata/users.json
testdata.products=src/test/resources/testdata/products.json
testdata.payment=src/test/resources/testdata/payment.json
testdata.contact=src/test/resources/testdata/contact.json
